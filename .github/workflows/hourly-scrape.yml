# Free hourly runs on GitHub Actions (no Google Cloud Functions).
# After push, enable: Repo → Settings → Actions → General → allow workflows.
#
# Optional: Repo → Settings → Secrets → Actions → add:
#   FIREBASE_SERVICE_ACCOUNT_JSON = full contents of your service account JSON
# (Same file you use locally; keeps Realtime DB in sync.)
#
# Schedules use UTC. Public repos: generous minutes. Private: 2000 min/month on free.

name: Hourly Predictz scrape

on:
  schedule:
    - cron: "0 * * * *" # every hour at minute 0 UTC
  workflow_dispatch: # run manually from Actions tab

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-scrape.txt

      - name: Install dependencies
        run: pip install -r requirements-scrape.txt

      - name: Write Firebase credentials (optional)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -c "import os, pathlib; pathlib.Path(os.environ['GITHUB_WORKSPACE']).joinpath('serviceAccountKey.json').write_text(os.environ['FIREBASE_SERVICE_ACCOUNT_JSON'], encoding='utf-8')"

      - name: Run scraper
        run: python scripts/hourly_scrape.py

      - name: Upload predictions artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predictions-json
          path: data/predictions.json
          if-no-files-found: warn
